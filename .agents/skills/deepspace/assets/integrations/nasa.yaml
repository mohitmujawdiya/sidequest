integration: nasa
endpoint_count: 7
usage_example: await integration.post('nasa/apod', { /* ...params */ })
tools:
  apod:
    method: POST
    endpoint_key: nasa/apod
    description: Get NASA Astronomy Picture of the Day. Supports single date, date
      range, or random count.
    input_schema:
      type: object
      properties:
        date:
          type: string
        start_date:
          type: string
        end_date:
          type: string
        count:
          type: number
          minimum: 1
          maximum: 100
        thumbs:
          type: boolean
      additionalProperties: false
    output_schema:
      type: object
      properties:
        success:
          type: boolean
        data:
          description: Raw NASA APOD response. Object when date given; array when date-range/count given.
          anyOf:
            - type: object
              properties:
                copyright:
                  type: string
                date:
                  type: string
                explanation:
                  type: string
                hdurl:
                  type: string
                media_type:
                  type: string
                service_version:
                  type: string
                title:
                  type: string
                url:
                  type: string
                thumbnail_url:
                  type: string
              required:
                - date
                - explanation
                - media_type
                - title
                - url
              additionalProperties: true
            - type: array
              items:
                type: object
                properties:
                  copyright:
                    type: string
                  date:
                    type: string
                  explanation:
                    type: string
                  hdurl:
                    type: string
                  media_type:
                    type: string
                  service_version:
                    type: string
                  title:
                    type: string
                  url:
                    type: string
                  thumbnail_url:
                    type: string
                required:
                  - date
                  - explanation
                  - media_type
                  - title
                  - url
                additionalProperties: true
        error:
          type: string
      required:
        - success
  cme:
    method: POST
    endpoint_key: nasa/cme
    description: Get NASA DONKI Coronal Mass Ejection (CME) data. startDate defaults
      to 30 days prior, endDate defaults to current UTC date.
    input_schema:
      type: object
      properties:
        startDate:
          type: string
        endDate:
          type: string
      additionalProperties: false
    output_schema:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          description: Raw NASA DONKI /CME response (array of CME events, verified via live api.nasa.gov)
          items:
            type: object
            properties:
              activityID:
                type: string
              catalog:
                type: string
              startTime:
                type: string
              instruments:
                type: array
              sourceLocation:
                type: string
              activeRegionNum:
                type:
                  - number
                  - "null"
              note:
                type: string
              submissionTime:
                type: string
              versionId:
                type: number
              link:
                type: string
              cmeAnalyses:
                type: array
              linkedEvents:
                type:
                  - array
                  - "null"
              sentNotifications:
                type:
                  - array
                  - "null"
            additionalProperties: true
        error:
          type: string
      required:
        - success
  flr:
    method: POST
    endpoint_key: nasa/flr
    description: Get NASA DONKI Solar Flare (FLR) data. startDate defaults to 30
      days prior, endDate defaults to current UTC date.
    input_schema:
      type: object
      properties:
        startDate:
          type: string
        endDate:
          type: string
      additionalProperties: false
    output_schema:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          description: Raw NASA DONKI /FLR response (array of solar flare events, verified via live api.nasa.gov)
          items:
            type: object
            properties:
              flrID:
                type: string
              catalog:
                type: string
              instruments:
                type: array
              beginTime:
                type: string
              peakTime:
                type: string
              endTime:
                type: string
              classType:
                type: string
              sourceLocation:
                type: string
              activeRegionNum:
                type:
                  - number
                  - "null"
              note:
                type: string
              submissionTime:
                type: string
              versionId:
                type: number
              link:
                type: string
              linkedEvents:
                type:
                  - array
                  - "null"
              sentNotifications:
                type:
                  - array
                  - "null"
            additionalProperties: true
        error:
          type: string
      required:
        - success
  gst:
    method: POST
    endpoint_key: nasa/gst
    description: Get NASA DONKI Geomagnetic Storm (GST) data. startDate defaults to
      30 days prior, endDate defaults to current UTC date.
    input_schema:
      type: object
      properties:
        startDate:
          type: string
        endDate:
          type: string
      additionalProperties: false
    output_schema:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          description: Raw NASA DONKI /GST response (array of geomagnetic storm events, verified via live api.nasa.gov)
          items:
            type: object
            properties:
              gstID:
                type: string
              startTime:
                type: string
              allKpIndex:
                type: array
              link:
                type: string
              linkedEvents:
                type: array
              submissionTime:
                type: string
              versionId:
                type: number
              sentNotifications:
                type: array
            additionalProperties: true
        error:
          type: string
      required:
        - success
  neo-browse:
    method: POST
    endpoint_key: nasa/neo-browse
    description: Browse the overall Near-Earth Objects data-set
    input_schema:
      type: object
      properties:
        page:
          type: number
          minimum: 0
        size:
          type: number
          minimum: 1
          maximum: 100
      additionalProperties: false
    output_schema:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          description: Raw NASA NeoWs /browse response (verified via live api.nasa.gov)
          properties:
            links:
              type: object
            page:
              type: object
              description: "{ size, total_elements, total_pages, number }"
            near_earth_objects:
              type: array
              items:
                type: object
                additionalProperties: true
          additionalProperties: true
        error:
          type: string
      required:
        - success
  neo-feed:
    method: POST
    endpoint_key: nasa/neo-feed
    description: Get NASA NeoWs (Near-Earth Objects) Feed. Retrieves asteroids based
      on closest approach date to Earth. endDate defaults to 7 days after
      startDate.
    input_schema:
      type: object
      properties:
        startDate:
          type: string
        endDate:
          type: string
      additionalProperties: false
    output_schema:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          description: Raw NASA NeoWs /feed response (verified via live api.nasa.gov)
          properties:
            links:
              type: object
              description: "{ next, previous, self } pagination URLs"
            element_count:
              type: number
            near_earth_objects:
              type: object
              description: Object keyed by date (YYYY-MM-DD) → array of NEO objects
              additionalProperties:
                type: array
                items:
                  type: object
                  additionalProperties: true
          additionalProperties: true
        error:
          type: string
      required:
        - success
  neo-lookup:
    method: POST
    endpoint_key: nasa/neo-lookup
    description: Lookup a specific Near-Earth Object by its NASA JPL small body (SPK-ID) ID
    input_schema:
      type: object
      properties:
        asteroidId:
          type: string
      required:
        - asteroidId
      additionalProperties: false
    output_schema:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          description: Raw NASA NeoWs /neo/:id response (verified via live api.nasa.gov)
          properties:
            links:
              type: object
            id:
              type: string
            neo_reference_id:
              type: string
            name:
              type: string
            designation:
              type: string
            nasa_jpl_url:
              type: string
            absolute_magnitude_h:
              type: number
            estimated_diameter:
              type: object
              description: "{ kilometers, meters, miles, feet } each with min/max estimates"
            is_potentially_hazardous_asteroid:
              type: boolean
            close_approach_data:
              type: array
            orbital_data:
              type: object
            is_sentry_object:
              type: boolean
          additionalProperties: true
        error:
          type: string
      required:
        - success
