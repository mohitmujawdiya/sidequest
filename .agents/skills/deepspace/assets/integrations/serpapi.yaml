        currency:
          type: string
        hl:
          type: string
      additionalProperties: false
    output_schema:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          description: Raw SerpAPI JSON response (passthrough - shape depends on engine)
          additionalProperties: true
        error:
          type: string
      required:
        - success
  serpapi/hotels:
