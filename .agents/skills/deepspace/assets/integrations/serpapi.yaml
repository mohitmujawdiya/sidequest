  serpapi/search:
    method: POST
    endpoint_key: serpapi/search
    description: "SerpApi search (default engine: google; override with `engine` to
      query other search engines)"
    input_schema:
      type: object
      properties:
        engine:
          default: google
          type: string
        q:
          type: string
        num:
          type: number
        location:
          type: string
