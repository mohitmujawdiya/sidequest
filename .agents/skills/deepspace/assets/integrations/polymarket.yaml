integration: polymarket
endpoint_count: 12
usage_example: await integration.post('polymarket/comments', { /* ...params */ })
tools:
  comments:
    method: POST
    endpoint_key: polymarket/comments
    description: Get community comments and discussion for a specific Polymarket
      event including content, timestamps, user profile, reactions, and
      engagement metrics
    input_schema:
      type: object
      properties:
        market_id:
          type: string
        limit:
          type: number
        offset:
          type: number
      required:
        - market_id
      additionalProperties: false
    output_schema:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            comments:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                  body:
                    type:
                      - string
                      - null
                  parentEntityType:
                    type:
                      - string
                      - null
                  parentEntityID:
                    type:
                      - number
                      - null
                  parentCommentID:
                    type:
                      - string
                      - null
                  userAddress:
                    type:
                      - string
                      - null
                  replyAddress:
                    type:
                      - string
                      - null
                  createdAt:
                    type:
                      - string
                      - null
                  updatedAt:
                    type:
                      - string
                      - null
                  profile:
                    type: object
                    properties: {}
                    additionalProperties: true
                  reactions:
                    type: array
                    items:
                      type: object
                      properties: {}
                      additionalProperties: true
                  reportCount:
                    type:
                      - number
                      - null
                  reactionCount:
                    type:
                      - number
                      - null
                required:
                  - id
                additionalProperties: true
          additionalProperties: false
        error:
          type: string
      required:
        - success
  event-detail:
    method: POST
    endpoint_key: polymarket/event-detail
    description: Get detailed information for a single Polymarket event including
      title, description, dates, total volume/liquidity, and all associated
      prediction markets
    input_schema:
      type: object
      properties:
        id:
          type: string
      required:
        - id
      additionalProperties: false
    output_schema:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          description: Raw gamma-api.polymarket.com /events/:id response (bare event object; verified via live API)
          properties:
            id:
              type: string
            ticker:
              type: string
            slug:
              type: string
            title:
              type: string
            description:
              type: string
            resolutionSource:
              type: string
            startDate:
              type: string
            creationDate:
              type: string
            endDate:
              type: string
            image:
              type: string
            icon:
              type: string
            active:
              type: boolean
            closed:
              type: boolean
            archived:
              type: boolean
            featured:
              type: boolean
            restricted:
              type: boolean
            liquidity:
              type: number
            volume:
              type: number
            openInterest:
              type: number
            volume24hr:
              type: number
            markets:
              type: array
              items:
                type: object
                additionalProperties: true
            tags:
              type: array
              items:
                type: object
                additionalProperties: true
          required:
            - id
          additionalProperties: true
        error:
          type: string
      required:
        - success
  events:
    method: POST
    endpoint_key: polymarket/events
    description: Get prediction market events from Polymarket. Events group related
      markets (e.g., "2024 Election" contains multiple questions). Returns event
      details with volume, liquidity, active status, and all associated markets.
    input_schema:
      type: object
      properties:
        limit:
          type: number
        offset:
          type: number
        order:
          type: string
        ascending:
          type: boolean
        closed:
          type: boolean
        tag:
          type: string
      additionalProperties: false
    output_schema:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          description: Raw gamma-api.polymarket.com /events response (bare array; verified via live API)
          items:
            type: object
            properties:
              id:
                type: string
              ticker:
                type: string
              slug:
                type: string
              title:
                type: string
              description:
                type: string
              resolutionSource:
                type: string
              startDate:
                type: string
              creationDate:
                type: string
              endDate:
                type: string
              image:
                type: string
              icon:
                type: string
              active:
                type: boolean
              closed:
                type: boolean
              archived:
                type: boolean
              new:
                type: boolean
              featured:
                type: boolean
              restricted:
                type: boolean
              liquidity:
                type: number
              volume:
                type: number
              openInterest:
                type: number
              sortBy:
                type: string
              category:
                type: string
              volume24hr:
                type: number
              volume1wk:
                type: number
              volume1mo:
                type: number
              volume1yr:
                type: number
              liquidityAmm:
                type: number
              liquidityClob:
                type: number
              competitive:
                type: number
              commentCount:
                type: number
              markets:
                type: array
                items:
                  type: object
                  additionalProperties: true
              series:
                type: array
                items:
                  type: object
                  additionalProperties: true
              tags:
                type: array
                items:
                  type: object
                  additionalProperties: true
              cyom:
                type: boolean
              enableNegRisk:
                type: boolean
              negRiskAugmented:
                type: boolean
              showAllOutcomes:
                type: boolean
              showMarketImages:
                type: boolean
              requiresTranslation:
                type: boolean
              eventMetadata:
                type: object
                additionalProperties: true
            required:
              - id
              - slug
              - title
            additionalProperties: true
        error:
          type: string
      required:
        - success
  market-detail:
    method: POST
    endpoint_key: polymarket/market-detail
    description: Get detailed information for a single prediction market including
      question, outcomes, current prices, volume, liquidity, and trading status
    input_schema:
      type: object
      properties:
        id:
          type: string
      required:
        - id
      additionalProperties: false
    output_schema:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          description: Raw gamma-api.polymarket.com /markets/:id response (bare market object; verified via live API)
          properties:
            id:
              type: string
            question:
              type: string
            conditionId:
              type: string
            slug:
              type: string
            resolutionSource:
              type: string
            endDate:
              type: string
            startDate:
              type: string
            image:
              type: string
            icon:
              type: string
            description:
              type: string
            outcomes:
              type: string
              description: JSON-encoded string array, e.g. "[\"Yes\", \"No\"]"
            outcomePrices:
              type: string
              description: JSON-encoded string array of probabilities
            volume:
              type: string
            liquidity:
              type: string
            active:
              type: boolean
            closed:
              type: boolean
            marketMakerAddress:
              type: string
            clobTokenIds:
              type: string
          required:
            - id
          additionalProperties: true
        error:
          type: string
      required:
        - success
  markets:
    method: POST
    endpoint_key: polymarket/markets
    description: Get prediction markets from Polymarket with filtering and
      pagination. Markets are individual questions with outcomes, current prices
      (probabilities), volume, and liquidity data
    input_schema:
      type: object
      properties:
        limit:
          type: number
        offset:
          type: number
        order:
          type: string
        ascending:
          type: boolean
        closed:
          type: boolean
        tag:
          type: string
        event_slug:
          type: string
      additionalProperties: false
    output_schema:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          description: Raw gamma-api.polymarket.com /markets response (bare array; verified via live API)
          items:
            type: object
            properties:
              id:
                type: string
              question:
                type: string
              conditionId:
                type: string
              slug:
                type: string
              resolutionSource:
                type: string
              endDate:
                type: string
              liquidity:
                type: string
              startDate:
                type: string
              image:
                type: string
              icon:
                type: string
              description:
                type: string
              outcomes:
                type: string
                description: JSON-encoded string array, e.g. "[\"Yes\", \"No\"]"
              outcomePrices:
                type: string
                description: JSON-encoded string array of probabilities
              volume:
                type: string
              active:
                type: boolean
              closed:
                type: boolean
              marketMakerAddress:
                type: string
              questionID:
                type: string
              enableOrderBook:
                type: boolean
              orderPriceMinTickSize:
                type: number
              orderMinSize:
                type: number
              volumeNum:
                type: number
              liquidityNum:
                type: number
              endDateIso:
                type: string
              startDateIso:
                type: string
              volume24hr:
                type: number
              volume1wk:
                type: number
              volume1mo:
                type: number
              volume1yr:
                type: number
              clobTokenIds:
                type: string
              umaBond:
                type: string
              umaReward:
                type: string
              events:
                type: array
                items:
                  type: object
                  additionalProperties: true
              acceptingOrders:
                type: boolean
              negRisk:
                type: boolean
              competitive:
                type: number
              lastTradePrice:
                type: number
              bestBid:
                type: number
              bestAsk:
                type: number
              spread:
                type: number
              oneDayPriceChange:
                type: number
              oneWeekPriceChange:
                type: number
              oneMonthPriceChange:
                type: number
            required:
              - id
              - question
              - slug
            additionalProperties: true
        error:
          type: string
      required:
        - success
  orderbook:
    method: POST
    endpoint_key: polymarket/orderbook
    description: Get orderbook depth showing all bids and asks for a Polymarket
      outcome token. Includes market metadata like min_order_size, tick_size,
      and neg_risk flag.
    input_schema:
      type: object
      properties:
        token_id:
          type: string
      required:
        - token_id
      additionalProperties: false
    output_schema:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            orderbook:
              type: object
              properties:
                market:
                  type: string
                asset_id:
                  type: string
                hash:
                  type: string
                timestamp:
                  type: string
                bids:
                  type: array
                  items:
                    type: object
                    properties:
                      price:
                        type: string
                      size:
                        type: string
                    required:
                      - price
                      - size
                    additionalProperties: false
                asks:
                  type: array
                  items:
                    type: object
                    properties:
                      price:
                        type: string
                      size:
                        type: string
                    required:
                      - price
                      - size
                    additionalProperties: false
                min_order_size:
                  type: string
                  description: Minimum order size for this market
                tick_size:
                  type: string
                  description: Minimum price increment
                neg_risk:
                  type: boolean
                  description: Whether negative risk is enabled
              additionalProperties: true
          additionalProperties: false
        error:
          type: string
      required:
        - success
  price:
    method: POST
    endpoint_key: polymarket/price
    description: Get current price for a Polymarket outcome token. Prices represent
      market probability (0-1) for that outcome. Side parameter is required per
      Polymarket API docs.
    input_schema:
      type: object
      properties:
        token_id:
          type: string
        side:
          type: string
      required:
        - token_id
      additionalProperties: false
    output_schema:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            price:
              type: object
              properties:
                price:
                  type: string
              additionalProperties: true
          additionalProperties: false
        error:
          type: string
      required:
        - success
  price-history:
    method: POST
    endpoint_key: polymarket/price-history
    description: Get historical price data for a Polymarket market showing how
      outcome probabilities changed over time. Returns time-series data with
      configurable intervals (1m to 1w)
    input_schema:
      type: object
      properties:
        token_id:
          type: string
        interval:
          type: string
        fidelity:
          type: number
        startTs:
          type: number
        endTs:
          type: number
      required:
        - token_id
      additionalProperties: false
    output_schema:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            history:
              type: array
              items:
                type: object
                properties:
                  t:
                    type: number
                    description: UTC timestamp
                  p:
                    type: number
                    description: Price
                required:
                  - t
                  - p
                additionalProperties: false
          additionalProperties: false
        error:
          type: string
      required:
        - success
  prices:
    method: POST
    endpoint_key: polymarket/prices
    description: Get current prices for multiple Polymarket outcome tokens in batch.
      Uses POST /prices endpoint internally. Returns prices keyed by token_id
      with BUY/SELL nested values.
    input_schema:
      type: object
      properties:
        token_ids:
          anyOf:
            - type: array
              items:
                type: string
            - type: string
      required:
        - token_ids
      additionalProperties: false
    output_schema:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            prices:
              type: object
              additionalProperties:
                type: object
                additionalProperties:
                  type: string
              description: Map of token_id to side to price
          additionalProperties: false
        error:
          type: string
      required:
        - success
  search:
    method: POST
    endpoint_key: polymarket/search
    description: Full-text search for Polymarket events and markets by title,
      description, or keywords. Uses public-search endpoint. Returns matching
      events with their associated markets
    input_schema:
      type: object
      properties:
        q:
          type: string
        limit:
          type: number
      required:
        - q
      additionalProperties: false
    output_schema:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          description: Raw gamma-api.polymarket.com /events?q=... response (bare array; SDK uses /events with q param, not a dedicated search endpoint; verified via live API)
          items:
            type: object
            properties:
              id:
                type: string
              ticker:
                type: string
              slug:
                type: string
              title:
                type: string
              description:
                type: string
              startDate:
                type: string
              endDate:
                type: string
              active:
                type: boolean
              closed:
                type: boolean
              liquidity:
                type: number
              volume:
                type: number
              markets:
                type: array
                items:
                  type: object
                  additionalProperties: true
              tags:
                type: array
                items:
                  type: object
                  additionalProperties: true
            required:
              - id
              - slug
              - title
            additionalProperties: true
        error:
          type: string
      required:
        - success
  tags:
    method: POST
    endpoint_key: polymarket/tags
    description: Get available categories/tags for filtering Polymarket events and markets
    input_schema:
      type: object
      properties: {}
      additionalProperties: false
    output_schema:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          description: Raw gamma-api.polymarket.com /tags response (bare array; verified via live API)
          items:
            type: object
            properties:
              id:
                type: string
              label:
                type: string
              slug:
                type: string
              createdAt:
                type: string
              updatedAt:
                type: string
              requiresTranslation:
                type: boolean
            required:
              - id
              - label
              - slug
            additionalProperties: true
        error:
          type: string
      required:
        - success
  trades:
    method: POST
    endpoint_key: polymarket/trades
    description: "Get recent public trade history from Polymarket. Returns a bare array
      of trade records enriched with user profile info, market/event metadata,
      and transaction hashes. Supports filtering by market, user, side,
      takerOnly, filterType, filterAmount, eventId."
    input_schema:
      type: object
      properties:
        token_id:
          type: string
          description: Market token ID (becomes `market` query param)
        limit:
          type: number
        offset:
          type: number
        user:
          type: string
          description: Filter to a specific user's wallet address
        side:
          type: string
          description: "'BUY' or 'SELL'"
        takerOnly:
          type: boolean
        filterType:
          type: string
        filterAmount:
          type: number
        eventId:
          type: string
      required:
        - token_id
      additionalProperties: false
    output_schema:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          description: Raw data-api.polymarket.com /trades response (bare array of enriched trade records; verified via live API)
          items:
            type: object
            properties:
              proxyWallet:
                type: string
                description: User's wallet address
              side:
                type: string
                description: "'BUY' or 'SELL'"
              asset:
                type: string
                description: Token ID being traded
              conditionId:
                type: string
              size:
                type: number
              price:
                type: number
              timestamp:
                type: number
                description: Unix seconds
              title:
                type: string
              slug:
                type: string
              icon:
                type: string
              eventSlug:
                type: string
              outcome:
                type: string
              outcomeIndex:
                type: number
              name:
                type: string
                description: User's display name
              pseudonym:
                type: string
              bio:
                type: string
              profileImage:
                type: string
              profileImageOptimized:
                type: string
              transactionHash:
                type: string
            required:
              - proxyWallet
              - side
              - conditionId
              - size
              - price
              - timestamp
              - transactionHash
            additionalProperties: true
        error:
          type: string
      required:
        - success
