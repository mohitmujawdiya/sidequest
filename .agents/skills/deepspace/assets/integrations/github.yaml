      additionalProperties: false
    output_schema:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            pull:
              type: object
              properties:
                id:
                  type: number
                number:
                  type: number
                title:
                  type: string
                state:
                  type: string
                html_url:
                  type: string
                body:
                  type:
                    - string
                    - null
                user:
                  type: object
                  properties:
                    login:
                      type: string
                    avatar_url:
                      type: string
                  required:
                    - login
                  additionalProperties: true
                created_at:
                  type: string
                updated_at:
                  type: string
                closed_at:
                  type:
                    - string
                    - null
                merged_at:
                  type:
                    - string
                    - null
                merged:
                  type: boolean
                mergeable:
                  type:
                    - boolean
                    - null
                merge_commit_sha:
                  type:
                    - string
                    - null
                head:
                  type: object
                  properties:
                    ref:
                      type: string
                    sha:
                      type: string
                  required:
                    - ref
                    - sha
                  additionalProperties: true
                base:
                  type: object
                  properties:
                    ref:
                      type: string
                    sha:
                      type: string
                  required:
                    - ref
                    - sha
                  additionalProperties: true
                labels:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      color:
                        type: string
                    required:
                      - name
                    additionalProperties: true
                additions:
                  type: number
                deletions:
                  type: number
                changed_files:
                  type: number
                commits:
                  type: number
                comments:
                  type: number
                review_comments:
                  type: number
              required:
                - id
                - number
                - title
                - state
              additionalProperties: true
          additionalProperties: false
        error:
          type: string
      required:
        - success
