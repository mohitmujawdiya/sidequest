integration: github
endpoint_count: 18
usage_example: await integration.post('github/get-commit', { /* ...params */ })
tools:
  get-commit:
    method: POST
    endpoint_key: github/get-commit
    description: Get a single commit with stats (additions, deletions, files)
    input_schema:
      type: object
      properties:
        owner:
          type: string
        repo:
          type: string
        sha:
          type: string
      required:
        - owner
        - repo
        - sha
      additionalProperties: false
    output_schema:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            commit:
              type: object
              properties:
                sha:
                  type: string
                html_url:
                  type: string
                commit:
                  type: object
                  properties:
                    message:
                      type: string
                    author:
                      type: object
                      properties:
                        name:
                          type: string
                        email:
                          type: string
                        date:
                          type: string
                      additionalProperties: false
                    committer:
                      type: object
                      properties:
                        name:
                          type: string
                        email:
                          type: string
                        date:
                          type: string
                      additionalProperties: false
                  required:
                    - message
                  additionalProperties: true
                author:
                  anyOf:
                    - type: object
                      properties:
                        login:
                          type: string
                        avatar_url:
                          type: string
                      required:
                        - login
                      additionalProperties: true
                    - type: null
                committer:
                  anyOf:
                    - type: object
                      properties:
                        login:
                          type: string
                        avatar_url:
                          type: string
                      required:
                        - login
                      additionalProperties: true
                    - type: null
                stats:
                  type: object
                  properties:
                    additions:
                      type: number
                    deletions:
                      type: number
                    total:
                      type: number
                  required:
                    - additions
                    - deletions
                    - total
                  additionalProperties: false
                files:
                  type: array
                  items:
                    type: object
                    properties:
                      filename:
                        type: string
                      status:
                        type: string
                      additions:
                        type: number
                      deletions:
                        type: number
                      changes:
                        type: number
                      patch:
                        type: string
                    required:
                      - filename
                      - status
                      - additions
                      - deletions
                      - changes
                    additionalProperties: true
              required:
                - sha
              additionalProperties: true
          additionalProperties: false
        error:
          type: string
      required:
        - success
  get-public-user:
    method: POST
    endpoint_key: github/get-public-user
    description: Get public GitHub user
    input_schema:
      type: object
      properties:
        username:
          type: string
      required:
        - username
      additionalProperties: false
    output_schema:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            user:
              type: object
              properties:
                login:
                  type: string
                id:
                  type: number
                name:
                  type:
                    - string
                    - null
                email:
                  type:
                    - string
                    - null
                avatar_url:
                  type: string
                html_url:
                  type: string
                public_repos:
                  type: number
                followers:
                  type: number
                following:
                  type: number
              required:
                - login
                - id
              additionalProperties: true
          additionalProperties: false
        error:
          type: string
      required:
        - success
  get-pull-request:
    method: POST
    endpoint_key: github/get-pull-request
    description: Get a single pull request with full details
    input_schema:
      type: object
      properties:
        owner:
          type: string
        repo:
          type: string
        pull_number:
          type: number
      required:
        - owner
