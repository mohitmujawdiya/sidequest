integration: youtube
endpoint_count: 3
usage_example: await integration.post('youtube/get-trending-videos', { /* ...params */ })
tools:
  get-trending-videos:
    method: POST
    endpoint_key: youtube/get-trending-videos
    description: Get trending videos
    input_schema:
      type: object
      properties:
        regionCode:
          type: string
        maxResults:
          type: number
          minimum: 1
          maximum: 50
      additionalProperties: false
    output_schema:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            videos:
              type: array
              description: Trending videos from YouTube v3 /videos?chart=mostPopular with snippet + statistics (verified via live API)
              items:
                type: object
                properties:
                  kind:
                    type: string
                  etag:
                    type: string
                  id:
                    type: string
                  snippet:
                    type: object
                    description: "{ publishedAt, channelId, title, description, thumbnails, channelTitle, tags, categoryId, liveBroadcastContent, defaultLanguage, localized, defaultAudioLanguage }"
                  statistics:
                    type: object
                    description: "{ viewCount, likeCount, favoriteCount, commentCount }"
                  links:
                    type: object
                    description: "Added by SDK: { watch, embed, thumbnail }"
                  embedHtml:
                    type: string
                    description: Added by SDK
                  markdownLink:
                    type: string
                    description: Added by SDK
                  formatted:
                    type: object
                    description: "Added by SDK when stats/contentDetails present: { views, duration }"
                additionalProperties: true
            totalResults:
              type: number
          required:
            - videos
            - totalResults
          additionalProperties: false
        error:
          type: string
      required:
        - success
  get-video-details:
    method: POST
    endpoint_key: youtube/get-video-details
    description: Get details for videos
    input_schema:
      type: object
      properties:
        id:
          type: string
      required:
        - id
      additionalProperties: false
    output_schema:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            videos:
              type: array
              description: Detailed video items from YouTube v3 /videos with snippet, statistics, contentDetails (verified via live API)
              items:
                type: object
                properties:
                  kind:
                    type: string
                  etag:
                    type: string
                  id:
                    type: string
                  snippet:
                    type: object
                    description: "{ publishedAt, channelId, title, description, thumbnails, channelTitle, tags, categoryId, liveBroadcastContent, defaultLanguage, localized, defaultAudioLanguage }"
                  statistics:
                    type: object
                    description: "{ viewCount, likeCount, favoriteCount, commentCount }"
                  contentDetails:
                    type: object
                    description: "{ duration, dimension, definition, caption, licensedContent, contentRating, projection }"
                  links:
                    type: object
                    description: "Added by SDK: { watch, embed, thumbnail }"
                  embedHtml:
                    type: string
                    description: Added by SDK
                  markdownLink:
                    type: string
                    description: Added by SDK
                  formatted:
                    type: object
                    description: "Added by SDK when stats/contentDetails present: { views, duration }"
                additionalProperties: true
          required:
            - videos
          additionalProperties: false
        error:
          type: string
      required:
        - success
  search-videos:
    method: POST
    endpoint_key: youtube/search-videos
    description: Search for videos and return URLs with metadata (duration, views,
      thumbnails)
    input_schema:
      type: object
      properties:
        q:
          type: string
        order:
          type: string
        maxResults:
          type: number
          minimum: 1
          maximum: 50
        regionCode:
          type: string
        publishedAfter:
          type: string
        publishedBefore:
          type: string
      required:
        - q
      additionalProperties: false
    output_schema:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            videos:
              type: array
              description: Search result items from YouTube v3 /search with SDK-added links/embedHtml/markdownLink (verified via live API)
              items:
                type: object
                properties:
                  kind:
                    type: string
                  etag:
                    type: string
                  id:
                    type: object
                    description: "Search results return { kind, videoId } object"
                  snippet:
                    type: object
                    description: "{ publishedAt, channelId, title, description, thumbnails, channelTitle, liveBroadcastContent, publishTime }"
                  links:
                    type: object
                    description: "Added by SDK: { watch, embed, thumbnail }"
                  embedHtml:
                    type: string
                    description: Added by SDK
                  markdownLink:
                    type: string
                    description: Added by SDK
                  formatted:
                    type: object
                    description: "Added by SDK when stats/contentDetails present (rare for search): { views, duration }"
                additionalProperties: true
            totalResults:
              type: number
          required:
            - videos
            - totalResults
          additionalProperties: false
        error:
          type: string
      required:
        - success
